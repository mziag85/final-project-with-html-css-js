<!doctype html>
<html lang="en">
  <head>
    <link rel="icon" type="image/png" href="./fotos/mainLogo.webp" />
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ასორტიმენტი</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Poppins:ital,wght@0,100;0,200;0,300;0,400;0,500;0,600;0,700;0,800;0,900;1,100;1,200;1,300;1,400;1,500;1,600;1,700;1,800;1,900&display=swap"
      rel="stylesheet" />
    <link rel="stylesheet" href="./style.css" />
  </head>
  <body>
    <header>
      <div class="header">
        <a href="./index.html" class="main_logo">
          <img class="mainFoto" src="./fotos/mainLogo.webp" alt="main Foto" />
          <span class="page_name">
            ყავის <br />
            კუთხე
          </span>
        </a>
        <button class="burger_menu">
          <img
            class="burger_icon"
            src="./fotos/iconBurger.webp"
            alt="burgerMenu" />
        </button>

        <div class="navigation">
          <ul class="nav">
            <li class="nav_items cursor">
              <a href="./index.html">მთავარი</a>
            </li>
            <li class="nav_items cursor">
              <a href="./assortment.html">ასორტიმენტი</a>
            </li>
            <li class="nav_items">
              <a href="./questions.html">FAQ</a>
            </li>
            <li class="nav_items cursor">
              <a href="./contact.html">კონტაქტი</a>
            </li>
          </ul>
        </div>

        <button class="sun">
          <img
            class="sun_icon cursor"
            src="./fotos/bright_modeIcon.webp"
            alt="sun icon" />
        </button>
      </div>
    </header>

    <main>
      <div class="search">
        <input class="input" type="text" id="input" placeholder="რა გსურთ?" />
        <button class="search_btn cursor">
          <img
            class="search_icon"
            src="./fotos/searchIcon.webp"
            alt="search icon" />
        </button>
      </div>
      <div class="cart_box">
        <h2 class="cart">კალათა</h2>
        <button id="deleteAll">ყველას წაშლა</button>
        <ul id="cart"></ul>
      </div>

      <div class="choice">
        <div class="item">
          <img
            class="choose_foto"
            src="./fotos/americano.webp"
            alt="americano" />
          <p class="choose_text">ამერიკანო</p>
          <p class="price">6ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img
            class="choose_foto"
            src="./fotos/cappuccino.webp"
            alt="cappuccino" />
          <p class="choose_text">კაპუჩინო</p>
          <p class="price">7ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img class="choose_foto" src="./fotos/espresso.webp" alt="espresso" />
          <p class="choose_text">ესპრესო</p>
          <p class="price">6ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img class="choose_foto" src="./fotos/latte.webp" alt="latte" />
          <p class="choose_text">ლატე</p>
          <p class="price">9ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img
            class="choose_foto"
            src="./fotos/cheesecake.webp"
            alt="cheesecake" />
          <p class="choose_text">ჩიზქეიქი</p>
          <p class="price">11ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img class="choose_foto" src="./fotos/pudding.webp" alt="pudding" />
          <p class="choose_text">პუდინგი</p>
          <p class="price">8ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img class="choose_foto" src="./fotos/lavaCake.webp" alt="lavaCake" />
          <p class="choose_text">ლავა-ქეიქი</p>
          <p class="price">12ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>

        <div class="item">
          <img class="choose_foto" src="./fotos/strudel.webp" alt="strudel" />
          <p class="choose_text">შტრუდელი</p>
          <p class="price">9ლ.</p>
          <button class="choose cursor">არჩევა</button>
        </div>
      </div>
    </main>

    <footer>
      <div class="footer">
        <p class="footer_text">2026წ.</p>
      </div>
    </footer>

    <script src="./js.js"></script>
  </body>
</html>
